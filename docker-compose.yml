services:
  qrcode-app:
    build: .
    container_name: openilink-app-qrcode
    restart: unless-stopped
    environment:
      PORT: "${PORT:-8093}"
      HUB_URL: "${HUB_URL}"
      BASE_URL: "${BASE_URL}"
      DB_PATH: "/data/qrcode.db"
    volumes:
      - qrcode-data:/data

volumes:
  qrcode-data:
